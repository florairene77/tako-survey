<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TAKO 亚运后勤资源库</title>
<link rel="manifest" href="manifest.json?v=8">
<meta name="theme-color" content="#7bab95">
<link rel="apple-touch-icon" href="icon-180.png?v=8">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=8">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=8">
<link rel="shortcut icon" href="favicon-32.png?v=8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TAKO">
<link rel="stylesheet" href="vendor/leaflet.css">
<script src="vendor/leaflet.js"></script>
<script src="vendor/supabase.js"></script>
<link rel="stylesheet" href="styles.css?v=8">
</head>
<body>

<!-- 登录闸 -->
<div id="gate">
  <div class="box">
    <img class="gate-logo" src="logo-full.png?v=8" alt="TAKO 名古屋亚运会后勤统筹系统">
    <p>HB 后勤组 · 内部共享</p>
    <div id="gate-step-pw">
      <input id="gate-pw" type="password" inputmode="text" placeholder="输入访问密码" autocomplete="off">
      <div class="err" id="gate-err"></div>
      <button id="gate-btn">进入</button>
    </div>
    <div id="gate-step-name" style="display:none">
      <input id="gate-name" type="text" placeholder="编辑者名字  eg：麦当劳汉堡" autocomplete="off">
      <div class="err" id="gate-name-err"></div>
      <button id="gate-name-btn">开始踏勘</button>
    </div>
  </div>
</div>

<!-- 顶栏 -->
<div class="topbar">
  <div class="inner">
    <button class="back" id="backbtn" style="display:none">‹</button>
    <img class="logo-img" src="logo-mascot.png?v=8" alt="TAKO">
    <div>
      <div class="title">TAKO</div>
      <div class="sub">名古屋亚运会后勤统筹系统</div>
    </div>
    <span class="rolebadge" id="rolebadge"></span>
  </div>
</div>

<div id="app" class="wrap"><div class="loading">加载中…</div></div>

<!-- lightbox -->
<div id="lb">
  <button class="close" id="lb-close">×</button>
  <img id="lb-img" src="" alt="">
  <div class="cap" id="lb-cap"></div>
  <div class="acts" id="lb-acts"></div>
</div>

<!-- 备注编辑/查看弹窗 -->
<div id="notem">
  <div class="nbox">
    <div class="ntitle" id="notem-title">备注</div>
    <textarea id="notem-text" placeholder="写下这张照片的备注，比如：这家便利店可订盒饭，营业 7:00–23:00，电话 052-xxx-xxxx"></textarea>
    <div class="nview" id="notem-view"></div>
    <div class="nacts">
      <button class="btn ghost" id="notem-cancel">关闭</button>
      <button class="btn" id="notem-save">保存备注</button>
    </div>
  </div>
</div>

<!-- 通用文字编辑弹窗（内部提示等） -->
<div id="textm">
  <div class="nbox">
    <div class="ntitle" id="textm-title">编辑</div>
    <textarea id="textm-text"></textarea>
    <div class="nacts">
      <button class="btn ghost" id="textm-cancel">取消</button>
      <button class="btn" id="textm-save">保存</button>
    </div>
  </div>
</div>

<!-- 酒店编辑弹窗 -->
<div id="hotelm">
  <div class="nbox">
    <div class="ntitle">编辑酒店信息</div>
    <label class="fl">酒店名称</label><input id="hm-name" type="text">
    <label class="fl">地址（可能会变）</label><input id="hm-address" type="text">
    <label class="fl">房型</label><input id="hm-room" type="text">
    <label class="fl">最近交通</label><input id="hm-transit" type="text">
    <label class="fl">到场馆车程</label><input id="hm-travel" type="text">
    <label class="fl">官网链接</label><input id="hm-url" type="text">
    <label class="fl">简要介绍（公开）</label><textarea id="hm-intro"></textarea>
    <div class="nacts">
      <button class="btn ghost" id="hm-cancel">取消</button>
      <button class="btn" id="hm-save">保存</button>
    </div>
  </div>
</div>

<!-- 编辑 顶部概览（绿色区）弹窗 -->
<div id="herom">
  <div class="nbox">
    <div class="ntitle">编辑项目概览</div>
    <label class="fl">项目名称</label><input id="hr-cat" type="text">
    <label class="fl">执行团队 / 城市</label><input id="hr-team" type="text">
    <label class="fl">C 码</label><input id="hr-code" type="text">
    <label class="fl">类型</label>
    <select id="hr-type"><option value="LIVE">LIVE</option><option value="ENG">ENG</option><option value="BOTH">LIVE+ENG</option></select>
    <label class="fl">实测车程</label><input id="hr-travel" type="text">
    <label class="fl">工作区间 开始</label><input id="hr-start" type="date">
    <label class="fl">工作区间 结束</label><input id="hr-end" type="date">
    <label class="fl">团队人数</label><input id="hr-size" type="text">
    <div class="nacts">
      <button class="btn ghost" id="hr-cancel">取消</button>
      <button class="btn" id="hr-save">保存</button>
    </div>
  </div>
</div>

<!-- 编辑 基本信息（白色区）弹窗 -->
<div id="venuem">
  <div class="nbox">
    <div class="ntitle">编辑基本信息</div>
    <label class="fl">场馆名（日文）</label><input id="vm-name" type="text">
    <label class="fl">场馆地址</label><input id="vm-addr" type="text">
    <label class="fl">最近公共交通</label><input id="vm-transit" type="text">
    <label class="fl">停车说明</label><input id="vm-parking" type="text">
    <label class="fl">场馆简要介绍（前台所有人可见）</label><textarea id="vm-intro"></textarea>
    <div class="nacts">
      <button class="btn ghost" id="vm-cancel">取消</button>
      <button class="btn" id="vm-save">保存</button>
    </div>
  </div>
</div>

<!-- 比赛项目 增/改 弹窗 -->
<div id="eventm">
  <div class="nbox">
    <div class="ntitle" id="eventm-title">比赛项目</div>
    <label class="fl">项目名称（中文）</label><input id="em-name" type="text">
    <label class="fl">English</label><input id="em-en" type="text">
    <label class="fl">日文</label><input id="em-jp" type="text">
    <label class="fl">日程（如 9/9 – 10/4）</label><input id="em-sched" type="text">
    <div class="nacts">
      <button class="btn ghost" id="em-cancel">取消</button>
      <button class="btn" id="em-save">保存</button>
    </div>
  </div>
</div>

<!-- 整块迁移弹窗 -->
<div id="migm">
  <div class="nbox">
    <div class="ntitle">🔀 迁移到其他场馆</div>
    <div class="mig-what" id="mig-what"></div>
    <label class="fl">迁移到哪个场馆</label>
    <select id="mig-target"></select>
    <div class="nacts">
      <button class="btn ghost" id="mig-cancel">取消</button>
      <button class="btn" id="mig-confirm">确认迁移</button>
    </div>
  </div>
</div>

<!-- 添加场馆弹窗 -->
<div id="addm">
  <div class="nbox">
    <div class="ntitle">＋ 添加场馆</div>
    <label class="fl">项目名称 *（如：足球、沙滩排球）</label><input id="am-cat" type="text">
    <label class="fl">执行团队 / 城市</label><input id="am-team" type="text">
    <label class="fl">C 码（如有，如 C12）</label><input id="am-code" type="text">
    <label class="fl">场馆名（日文，可后补）</label><input id="am-name" type="text">
    <label class="fl">场馆地址（可后补）</label><input id="am-addr" type="text">
    <label class="fl">类型</label>
    <select id="am-type"><option value="LIVE">LIVE</option><option value="ENG">ENG</option><option value="BOTH">LIVE+ENG</option></select>
    <div class="nacts">
      <button class="btn ghost" id="am-cancel">取消</button>
      <button class="btn" id="am-save">建好，去填坑位</button>
    </div>
  </div>
</div>

<!-- 谢谢你小章鱼 -->
<div id="thankyou">
  <div class="ty-card">
    <img src="thankyou.png?v=8" alt="谢谢你">
    <div class="ty-sub">踏勘成果已记录 · 辛苦啦</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="app.js?v=8"></script>
</body>
</html>
